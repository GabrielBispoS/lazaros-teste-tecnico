<div style="padding: 30px; max-width: 800px; margin: 0 auto;">
  <h2>Gerenciamento de Perfis</h2>

  <div style="display: flex; gap: 15px; align-items: baseline; margin-bottom: 20px;">
    <mat-form-field appearance="outline" style="flex: 1;">
      <mat-label>Descrição do Perfil</mat-label>
      <input matInput [(ngModel)]="perfilAtual.descricao" placeholder="Ex: Administrador" required minlength="5">
      <mat-hint>Obrigatório. Mínimo de 5 caracteres.</mat-hint>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="salvar()">
    <mat-icon>{{ editando ? 'save' : 'add' }}</mat-icon>
        {{ editando ? 'Atualizar' : 'Adicionar' }}
    </button>
    
    <button *ngIf="editando" mat-button color="warn" (click)="cancelar()">Cancelar</button>
  </div>

  <table mat-table [dataSource]="perfis" class="mat-elevation-z8" style="width: 100%;">
    
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let perfil"> {{perfil.id}} </td>
    </ng-container>

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let perfil"> {{perfil.descricao}} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let perfil">
        <button mat-icon-button color="primary" (click)="editar(perfil)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deletar(perfil.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
  </table>
</div>
